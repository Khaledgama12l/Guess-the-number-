<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن الرقم - غرف رقمية</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; background: var(--main); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .room-id { background: #e0e7ff; color: #3730a3; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.5rem; margin: 10px 0; letter-spacing: 5px; }
        .reply-box { background: #fff7ed; padding: 15px; border-radius: 12px; border: 1px solid #ffedd5; margin-bottom: 15px; }
        .hidden { display: none; }
        .log-entry { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #f1f5f9; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div id="setupView">
        <h3 style="margin:0">دخول الغرفة</h3>
        <input type="password" id="mySecret" placeholder="رقمك السري (3 أرقام)" maxlength="3">
        
        <div>
            <p style="font-size:0.8rem; margin:10px 0 5px">رقم غرفتك (أعطه لصديقك):</p>
            <div id="displayMyId" class="room-id">...</div>
        </div>

        <input type="number" id="targetId" placeholder="أدخل رقم غرفة الخصم">
        <button class="btn" onclick="connectToOpponent()">اتصال وبدء اللعب</button>
    </div>

    <div id="gameView" class="hidden">
        <div id="replyArea" class="hidden reply-box">
            <p>الخصم خمن: <strong id="oppGuessVal" style="font-size:1.3rem"></strong></p>
            <div style="display:flex; gap:5px">
                <select id="pIn"><option value="0">0 صح</option><option value="1">1 صح</option><option value="2">2 صح</option><option value="3">3 صح</option></select>
                <select id="vIn"><option value="0">0 غلط</option><option value="1">1 غلط</option><option value="2">2 غلط</option></select>
            </div>
            <button class="btn" style="background:#ea580c; margin-top:10px" onclick="sendReply()">إرسال الرد</button>
        </div>

        <input type="number" id="myGuess" placeholder="تخمينك للخصم">
        <button class="btn" onclick="sendGuess()">إرسال التخمين</button>

        <div id="logs" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px"></div>
    </div>
</div>

<script>
    let peer, conn;
    
    // توليد رقم عشوائي مكون من 6 أرقام للغرفة
    const myNumericId = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('displayMyId').innerText = myNumericId;

    // ربط الـ Peer بالرقم الرقمي
    peer = new Peer(myNumericId);

    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') {
            // لو الرقم محجوز، جرب رقم تاني
            location.reload();
        } else {
            alert("خطأ في الاتصال: " + err.type);
        }
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function connectToOpponent() {
        const targetId = document.getElementById('targetId').value;
        if(!targetId) return alert("اكتب رقم الغرفة");
        conn = peer.connect(targetId);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
        });

        conn.on('data', (data) => {
            if(data.type === 'guess') {
                document.getElementById('replyArea').classList.remove('hidden');
                document.getElementById('oppGuessVal').innerText = data.val;
            } else if(data.type === 'reply') {
                const log = `<div class="log-entry"><span>[${data.guess}]</span> <span>${data.p} صح / ${data.v} غلط</span></div>`;
                document.getElementById('logs').insertAdjacentHTML('afterbegin', log);
            }
        });
    }

    function sendGuess() {
        const val = document.getElementById('myGuess').value;
        if(val.length < 1) return;
        conn.send({ type: 'guess', val: val });
        document.getElementById('myGuess').value = "";
    }

    function sendReply() {
        const p = document.getElementById('pIn').value, v = document.getElementById('vIn').value;
        const g = document.getElementById('oppGuessVal').innerText;
        conn.send({ type: 'reply', guess: g, p: p, v: v });
        document.getElementById('replyArea').classList.add('hidden');
    }
</script>
</body>
</html>
