<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن الرقم - رابط مباشر</title>
    <style>
        :root { --main: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .hidden { display: none; }
        .share-box { background: #eef2ff; pading: 15px; border-radius: 10px; text-align: center; margin: 15px 0; border: 1px solid #e0e7ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .reply-area { background: #fff4e5; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div id="setupView">
        <h3>خمن الرقم P2P</h3>
        <label>رقمك السري:</label>
        <input type="password" id="mySecret" placeholder="أدخل 3 أرقام" maxlength="3">
        
        <div id="initButtons">
            <button class="btn" onclick="initGame(true)">إنشاء غرفة وإرسال رابط</button>
            <button class="btn" onclick="initGame(false)" style="background:#64748b">انضمام يدوي</button>
        </div>

        <div id="waitingArea" class="hidden share-box">
            <p id="statusMsg">جاري تجهيز الرابط...</p>
            <button class="btn" id="shareBtn" onclick="shareLink()" style="display:none; background:#059669">مشاركة الرابط مع صديقك</button>
            <textarea id="incomingCode" class="hidden" placeholder="الصق كود الرد هنا"></textarea>
            <button class="btn hidden" id="finalConnect" onclick="finalize()" style="background:#059669">بدء اللعب</button>
        </div>
    </div>

    <div id="gameView" class="hidden">
        <div id="replySection" class="reply-area hidden">
            <p>الخصم خمن: <strong id="oppGuessVal"></strong></p>
            <select id="posIn"><option value="0">0 صح بمكانه</option><option value="1">1 صح بمكانه</option><option value="2">2 صح بمكانه</option><option value="3">3 صح بمكانه</option></select>
            <select id="valIn"><option value="0">0 صح مكان غلط</option><option value="1">1 صح مكان غلط</option><option value="2">2 صح مكان غلط</option><option value="3">3 صح مكان غلط</option></select>
            <button class="btn" style="background:#ea580c" onclick="submitReply()">إرسال الرد</button>
        </div>

        <input type="number" id="myGuess" placeholder="تخمينك لليوزر">
        <button class="btn" onclick="sendGuess()">إرسال التخمين</button>

        <table>
            <thead><tr><th>الرقم</th><th>مكان صح</th><th>رقم صح</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
    </div>
</div>

<script>
    let pc, dataChannel, generatedLink = "";
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const joinCode = urlParams.get('join');
        if (joinCode) {
            document.getElementById('initButtons').classList.add('hidden');
            document.getElementById('waitingArea').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "تم استلام الرابط. ادخل سرك ثم اضغط بدء.";
            document.getElementById('finalConnect').classList.remove('hidden');
        }
    };

    function initGame(isHost) {
        if(document.getElementById('mySecret').value.length < 3) return alert("ادخل سرك");
        document.getElementById('waitingArea').classList.remove('hidden');
        pc = new RTCPeerConnection(config);

        pc.onicecandidate = e => {
            if(!e.candidate) {
                const sdp = btoa(JSON.stringify(pc.localDescription));
                if(isHost) {
                    generatedLink = window.location.origin + window.location.pathname + "?join=" + sdp;
                    document.getElementById('shareBtn').style.display = "block";
                    document.getElementById('statusMsg').innerText = "الرابط جاهز للمشاركة:";
                    document.getElementById('incomingCode').classList.remove('hidden');
                    document.getElementById('incomingCode').placeholder = "الصق كود الرد من صديقك هنا";
                    document.getElementById('finalConnect').classList.remove('hidden');
                } else {
                    alert("انسخ الكود التالي وارسله للمضيف:\n\n" + sdp);
                    console.log(sdp);
                }
            }
        };

        if(isHost) {
            dataChannel = pc.createDataChannel("game");
            setupEvents();
            pc.createOffer().then(d => pc.setLocalDescription(d));
        } else {
            pc.ondatachannel = e => { dataChannel = e.channel; setupEvents(); };
            const urlParams = new URLSearchParams(window.location.search);
            const offer = JSON.parse(atob(urlParams.get('join')));
            pc.setRemoteDescription(new RTCSessionDescription(offer)).then(() => {
                pc.createAnswer().then(d => pc.setLocalDescription(d));
            });
        }
    }

    async function shareLink() {
        if (navigator.share) {
            await navigator.share({ title: 'تحدي خمن الرقم', url: generatedLink });
        } else {
            prompt("انسخ الرابط يدوياً:", generatedLink);
        }
    }

    function finalize() {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('join')) { // الضيف
            // الضيف لا يحتاج لصق كود، هو بالفعل أرسل الـ Answer
            document.getElementById('statusMsg').innerText = "انتظر المضيف يفتح القناة...";
        } else { // المضيف
            const sdp = document.getElementById('incomingCode').value;
            pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(sdp))));
        }
    }

    function setupEvents() {
        dataChannel.onopen = () => {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
        };
        dataChannel.onmessage = e => {
            const d = JSON.parse(e.data);
            if(d.t === 'g') {
                document.getElementById('replySection').classList.remove('hidden');
                document.getElementById('oppGuessVal').innerText = d.v;
            } else { addLog(d.g, d.p, d.v); }
        };
    }

    function sendGuess() {
        const v = document.getElementById('myGuess').value;
        dataChannel.send(JSON.stringify({t:'g', v: v}));
        document.getElementById('myGuess').value = "";
    }

    function submitReply() {
        const p = document.getElementById('posIn').value, v = document.getElementById('valIn').value;
        const g = document.getElementById('oppGuessVal').innerText;
        dataChannel.send(JSON.stringify({t:'r', g: g, p: p, v: v}));
        document.getElementById('replySection').classList.add('hidden');
    }

    function addLog(g, p, v) {
        document.getElementById('logs').insertAdjacentHTML('afterbegin', `<tr><td>${g}</td><td>${p}</td><td>${v}</td></tr>`);
    }
</script>
</body>
</html>
