<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Hub Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5260/5260478.png">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text: #f8fafc; --primary: #3b82f6; --secondary: #8b5cf6; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); text-align: center; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: auto; padding: 15px; padding-top: env(safe-area-inset-top); }
        .card { background: var(--card); padding: 20px; border-radius: 24px; margin-top: 15px; border: 1px solid #334155; }
        .hidden { display: none !important; }
        button { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 14px; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #475569; opacity: 0.6; cursor: not-allowed; }
        .btn-alt { background: #475569; }
        .btn-primary { background: var(--primary); }
        .btn-online { background: var(--secondary); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; text-align: center; box-sizing: border-box; }
        #grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .cell { aspect-ratio: 1/1; background: #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #fff; }
        .cell.occupied { background: #1e293b; border: 2px solid var(--accent); }
        .cell.marked { background: var(--accent) !important; color: #000 !important; }
        #mangoWord { font-size: 2.8rem; font-weight: 900; margin-top: 25px; letter-spacing: 12px; color: var(--accent); }
        .crossed { text-decoration: line-through; opacity: 0.5; }
        .stepper-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stepper { background: #0f172a; padding: 10px 5px; border-radius: 16px; border: 1px solid #334155; }
        .stepper label { font-size: 0.7rem; color: #94a3b8; display: block; margin-bottom: 8px; }
        .stepper-controls { display: flex; align-items: center; justify-content: space-around; }
        .step-btn { background: #334155; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .log-box { background: #0f172a; border-radius: 12px; padding: 10px; margin-top: 5px; height: 200px; overflow-y: auto; border: 1px solid #334155; }
        .log-entry { border-bottom: 1px solid #1e293b; padding: 8px 0; display: flex; flex-direction: column; align-items: flex-start; text-align: right; }
        #countdown { font-size: 5rem; font-weight: 900; color: var(--accent); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; text-shadow: 0 0 30px rgba(34, 197, 94, 0.6); pointer-events: none; }
        .xo-cell { aspect-ratio: 1/1; background: #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; }
.xo-cell.taken { cursor: not-allowed; }
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0.9;
    z-index: 9999;
    transition: opacity 0.3s;
}
.toast.hidden { display: none; }
    </style>
</head>

<body>
<div id="toast" class="hidden toast"></div>
<div class="container">
    <div id="countdown" class="hidden"></div>
    <div id="homeView">
        <h2 style="margin: 40px 0;">🎮 Game Hub Pro</h2>
        <div id="playerNameSetup">
    <input type="text" id="playerNameInput" placeholder="اكتب اسمك">
    <button onclick="savePlayerName()">حفظ</button>
</div>
        <button onclick="switchView('mangoView')">🍉 Mango Game</button>
        <button onclick="switchView('guessView')" class="btn-primary">🔢 Guess Number</button>
        <button onclick="switchView('xoView')" class="btn-online">❌ Tic-Tac-Toe ⭕</button> </div>
    </div>

    <div id="mangoView" class="hidden">
    <div class="card">
        <h3 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            🍉 Mango Game 
            <span id="mOnlineBadge" class="hidden" style="font-size: 0.7rem; background: var(--secondary); padding: 2px 8px; border-radius: 10px;">Online</span>
        </h3>

        <div id="mangoModeSelect">
            <button class="btn-primary" onclick="startMangoLocal()">اللعب محلي (سريع)</button>
            <button class="btn-online" onclick="showMangoOnlineSetup()">اللعب أونلاين (حتى 4 لاعبين)</button>
        </div>

        <div id="mangoOnlineSetup" class="hidden">
            <div id="mangoEntryActions">
                <button class="btn-online" onclick="hostMango()">إنشاء غرفة (Host)</button>
                
                <div id="mangoHostOptions" class="hidden" style="margin:10px 0; background:#0f172a; padding:15px; border-radius:15px; border:1px solid var(--secondary);">
                    <label style="display:block; margin-bottom:10px; font-size:0.9rem;">عدد اللاعبين المطلوب:</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <button class="btn-alt" style="margin:0" onclick="setMaxPlayers(2)">2</button>
                        <button class="btn-alt" style="margin:0" onclick="setMaxPlayers(3)">3</button>
                        <button class="btn-alt" style="margin:0" onclick="setMaxPlayers(4)">4</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="document.getElementById('mangoJoinBox').classList.toggle('hidden')">انضمام لغرفة</button>
                
                <div id="mangoJoinBox" class="hidden" style="margin-top: 10px;">
                    <input type="number" id="mRoomID" placeholder="أدخل كود الغرفة">
                    <button class="btn-online" onclick="joinMango()">دخول الآن</button>
                </div>

                <button class="btn-alt" onclick="backToMangoMode()" style="margin-top: 20px;">رجوع</button>
            </div>
        </div>

        <div id="mangoPlayArea" class="hidden">
            <div id="mOnlineHeader" class="hidden" style="margin-bottom:15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px;">
                <div id="mRoomCodeDisp" style="color:var(--secondary); font-weight:bold; font-size: 1.2rem;"></div>
                <div id="mPlayersCount" style="font-size:0.8rem; opacity:0.7; margin-top: 5px;">بانتظار اللاعبين...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="mNewGridBtn" style="flex: 1;" onclick="randomFillMango()">توزيع عشوائي</button>
                <button id="mNewGridBtn" onclick="initMango()" style="flex: 1;">جدول جديد</button>
                <button id="mangoStartBtn" class="btn-accent hidden" style="flex: 1; background: var(--accent);">
    ابدأ اللعب 🚀
</button>
            </div>

            <div id="mTurnDisp" class="hidden" style="margin: 15px 0; padding: 10px; border-radius: 12px; font-weight: bold; font-size: 0.9rem;"></div>

            <div id="grid"></div>
            <div id="mangoWord"></div>

            <div class="card chat-mini" style="margin-top:20px; padding: 10px; background: #16213e; border: 1px solid #334155;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span style="font-size: 0.8rem; font-weight: bold;">الدردشة المباشرة</span>
                    <button id="micBtn" class="btn-alt" style="width: auto; padding: 5px 12px; font-size: 0.7rem; margin: 0;" onclick="enableMicrophone()">
                        🔇 المايك مقفول
                    </button>
                </div>
                
                <div id="chatBox" class="log-box" style="height:120px; font-size:0.8rem; margin-bottom: 8px; text-align: right;">
                    </div>

                <div style="display: flex; gap: 5px;">
                    <input type="text" id="chatInput" placeholder="اكتب للجميع..." style="margin:0; padding: 10px; font-size: 0.8rem;">
                    <button onclick="sendChatMessage()" style="width: 70px; margin:0; padding: 0;">إرسال</button>
                </div>
            </div>
        </div>

        <button onclick="switchView('homeView')" class="btn-alt" style="margin-top:20px">العودة للرئيسية</button>
    </div>
</div>



    <div id="guessView" class="hidden">
        <div class="card">
            <h3>🔢 Guess Number</h3>
            <div id="guessSetup">
                <div id="modeSelection">
                    <button class="btn-primary" onclick="setGuessMode('local')">اللعب محلي</button>
                    <button class="btn-online" onclick="setGuessMode('online')">اللعب أونلاين</button>
                </div>
                <div id="onlineOptions" class="hidden">
                    <button class="btn-online" onclick="hostRoom()">إنشاء غرفة (Host)</button>
                    <button class="btn-primary" onclick="showJoinInput()">دخول غرفة (Join)</button>
                    <button class="btn-alt" onclick="backToMode()">رجوع</button>
                </div>
                <div id="joinInput" class="hidden">
                    <input type="number" id="roomID" placeholder="كود الغرفة">
                    <button class="btn-primary" onclick="joinRoom()">انضمام</button>
                    <button class="btn-alt" onclick="showOnlineOptions()">رجوع</button>
                </div>
                <div id="localSetup" class="hidden">
                    <input type="number" id="localSecret" placeholder="أدخل سرك">
                    <button onclick="startLocalGame()">ابدأ</button>
                    <button class="btn-alt" onclick="backToMode()">رجوع</button>
                </div>
                <div id="secretInputArea" class="hidden">
                    <div id="roomDisplay" style="color:var(--secondary); font-weight:bold; margin-bottom:10px"></div>
                    <input type="number" id="onlineSecretInput" placeholder="أدخل سرك">
                    <button id="readyBtn" onclick="sendReady()">أنا جاهز!</button>
                    <p id="waitMsg" style="color:#94a3b8; font-size:0.8rem">بانتظار استقرار الاتصال...</p>
                </div>
            </div>

            <div id="guessPlay" class="hidden">
                <div style="background:#334155; padding:5px 15px; border-radius:20px; margin-bottom:15px; display:inline-block">
                    سرك: <span id="displaySecret" style="color:var(--accent)"></span>
                </div>
                <div id="turnIndicator" style="margin-bottom: 10px; font-weight: bold;"></div>
                <input type="number" id="currentGuess" placeholder="التخمين" inputmode="numeric">
                <div class="stepper-container">
                    <div class="stepper"><label>صح ✅</label><div class="stepper-controls"><div class="step-btn" onclick="uStep('s1',-1)">-</div><div id="s1">0</div><div class="step-btn" onclick="uStep('s1',1)">+</div></div></div>
                    <div class="stepper"><label>مكان 🔄</label><div class="stepper-controls"><div class="step-btn" onclick="uStep('s2',-1)">-</div><div id="s2">0</div><div class="step-btn" onclick="uStep('s2',1)">+</div></div></div>
                    <div class="stepper"><label>غلط ❌</label><div class="stepper-controls"><div class="step-btn" onclick="uStep('s3',-1)">-</div><div id="s3">0</div><div class="step-btn" onclick="uStep('s3',1)">+</div></div></div>
                </div>
                <button id="actionBtn" onclick="handleAction()">إرسال</button>
                
                <div id="logsGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <div>
                        <small style="color:var(--accent)">تخميناتي</small>
                        <div id="myLogs" class="log-box"></div>
                    </div>
                    <div>
                        <small style="color:var(--secondary)">الخصم</small>
                        <div id="opLogs" class="log-box"></div>
                    </div>
                </div>

                <button style="background:#ef4444; margin-top:10px" onclick="location.reload()">إعادة</button>
            </div>
            <button onclick="switchView('homeView')" class="btn-alt" style="margin-top:10px">الرئيسية</button>
        </div>
    </div>
    <div id="xoView" class="hidden">
    <div class="card">
        <h3>❌ Tic-Tac-Toe ⭕</h3>
        <div id="xoSetup">
            <button class="btn-online" onclick="hostXORoom()">إنشاء غرفة (Host)</button>
            <button class="btn-primary" onclick="showXOJoin()">دخول غرفة (Join)</button>
            <div id="xoJoinInput" class="hidden" style="margin-top:10px">
                <input type="number" id="xoRoomID" placeholder="كود الغرفة">
                <button onclick="joinXORoom()">انضمام</button>
            </div>
        </div>

        <div id="xoPlay" class="hidden">
    <div id="xoRoomDisplay" style="color:var(--secondary); font-weight:bold; margin-bottom:5px"></div>
    <div style="display: flex; justify-content: space-around; background: #0f172a; padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155;">
        <div><small>أنت</small><div id="myScore" style="font-size: 1.5rem; font-weight: bold; color: var(--accent);">0</div></div>
        <div style="align-self: center; opacity: 0.5;">VS</div>
        <div><small>الخصم</small><div id="opScore" style="font-size: 1.5rem; font-weight: bold; color: var(--secondary);">0</div></div>
    </div>
    
    <div id="xoTurnIndicator" style="margin-bottom:10px; font-weight:bold">بانتظار الخصم...</div>
    <div id="xoGrid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; max-width:300px; margin:auto"></div>
    <button style="background:#ef4444; margin-top:20px" onclick="location.reload()">خروج من الغرفة</button>
</div>
        <button onclick="switchView('homeView')" class="btn-alt" style="margin-top:10px">الرئيسية</button>
    </div>
</div>
</div>





































<div id="finishOverlay" class="hidden" style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); animation: fadeIn 0.3s ease;">
    <div style="background: var(--card); padding: 40px 20px; border-radius: 32px; border: 2px solid var(--accent); width: 85%; max-width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <div id="finishIcon" style="font-size: 5rem; margin-bottom: 15px;">🏆</div>
        <h2 id="finishTitle" style="font-size: 2rem; margin: 10px 0; color: var(--accent);">مبروك الفوز!</h2>
        <p id="finishMsg" style="color: #94a3b8; margin-bottom: 30px;">لقد قمت بأداء رائع كالعادة.</p>
        <button onclick="location.reload()" style="background: var(--primary); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">لعب مرة أخرى</button>
        <button onclick="document.getElementById('finishOverlay').classList.add('hidden')" class="btn-alt" style="margin-top: 10px; font-size: 14px; opacity: 0.7;">إغلاق</button>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
    .hidden { display: none !important; }
</style>


















<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="js/t.js"></script>

</body>
</html>
