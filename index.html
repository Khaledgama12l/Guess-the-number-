<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن الرقم - النسخة المستقرة</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 420px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; background: var(--main); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .room-display { background: #eff6ff; border: 2px dashed #bfdbfe; color: #1e40af; padding: 15px; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .secret-view { background: #334155; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .reply-box { background: #fff7ed; padding: 15px; border-radius: 15px; border: 1px solid #ffedd5; margin: 15px 0; }
        .log-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-family: monospace; }
        #status { font-size: 0.8rem; text-align: center; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" style="color: #666;">انتظار اختيار الدور...</div>

    <div id="initialView">
        <h3>خمن الرقم</h3>
        <input type="number" id="inputSecret" placeholder="سرك (3 أرقام)" maxlength="3">
        <button class="btn" style="margin-bottom:10px" onclick="initRole('host')">أنا المضيف (Host)</button>
        <button class="btn" style="background:#64748b" onclick="initRole('join')">أنا المنضم (Join)</button>
    </div>

    <div id="hostView" class="hidden">
        <p>رقم الغرفة للخصم:</p>
        <div id="myRoomId" class="room-display">...</div>
        <p style="text-align:center; font-size:0.8rem">بانتظار دخول الطرف الآخر...</p>
    </div>

    <div id="joinView" class="hidden">
        <input type="number" id="targetId" placeholder="ادخل رقم غرفة الهوست">
        <button class="btn" onclick="startConnect()">اتصال الآن</button>
    </div>

    <div id="gameView" class="hidden">
        <div class="secret-view">سرك: <span id="permSecret"></span></div>
        
        <div id="replyArea" class="hidden reply-box">
            <p>خمن الخصم: <strong id="guessVal"></strong></p>
            <div style="display:flex; gap:5px">
                <select id="pIn"><option value="0">0 صح</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                <select id="vIn"><option value="0">0 غلط</option><option value="1">1</option><option value="2">2</option></select>
            </div>
            <button class="btn" style="background:#ea580c; margin-top:10px" onclick="reply()">إرسال الرد</button>
        </div>

        <input type="number" id="myGuess" placeholder="تخمينك">
        <button class="btn" onclick="guess()">إرسال</button>
        <div id="logs" style="margin-top:15px"></div>
    </div>
</div>

<script>
    let peer, conn, secret;

    function initRole(role) {
        secret = document.getElementById('inputSecret').value;
        if(secret.length < 3) return alert("اكتب سرك");
        
        document.getElementById('initialView').classList.add('hidden');
        document.getElementById('permSecret').innerText = secret;
        
        if(role === 'host') {
            const rid = Math.floor(100000 + Math.random() * 900000).toString();
            peer = new Peer(rid);
            document.getElementById('hostView').classList.remove('hidden');
            document.getElementById('status').innerText = "جاري إنشاء الغرفة...";
            
            peer.on('open', id => {
                document.getElementById('myRoomId').innerText = id;
                document.getElementById('status').innerText = "الغرفة جاهزة";
            });
            peer.on('connection', c => {
                conn = c;
                setupGame();
            });
        } else {
            peer = new Peer();
            document.getElementById('joinView').classList.remove('hidden');
            document.getElementById('status').innerText = "جاهز للاتصال بمضيف";
        }
    }

    function startConnect() {
        const tid = document.getElementById('targetId').value;
        if(!tid) return;
        document.getElementById('status').innerText = "جاري الاتصال...";
        conn = peer.connect(tid);
        setupGame();
    }

    function setupGame() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "متصل!";
            document.getElementById('hostView').classList.add('hidden');
            document.getElementById('joinView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
        });

        conn.on('data', data => {
            if(data.t === 'g') {
                document.getElementById('replyArea').classList.remove('hidden');
                document.getElementById('guessVal').innerText = data.v;
            } else {
                document.getElementById('logs').insertAdjacentHTML('afterbegin', 
                    `<div class="log-item"><span>[${data.g}]</span> <span>${data.p} صح / ${data.v} غلط</span></div>`);
            }
        });
    }

    function guess() {
        const v = document.getElementById('myGuess').value;
        if(!v) return;
        conn.send({t:'g', v:v});
        document.getElementById('myGuess').value = "";
    }

    function reply() {
        const p = document.getElementById('pIn').value, v = document.getElementById('vIn').value;
        const g = document.getElementById('guessVal').innerText;
        conn.send({t:'r', g:g, p:p, v:v});
        document.getElementById('replyArea').classList.add('hidden');
    }
</script>
</body>
</html>
