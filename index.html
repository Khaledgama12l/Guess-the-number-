<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Hub Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GameHub">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22GameHub%20Pro%22%2C%22short_name%22%3A%22GameHub%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%230f172a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F8030%2F8030198.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text: #f8fafc; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); text-align: center; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: auto; padding: 15px; padding-top: env(safe-area-inset-top); }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid #334155; position: relative; }
        .hidden { display: none; }
        
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-alt { background: #475569; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; text-align: center; }

        /* Mango Grid */
        #mangoContainer { position: relative; width: 100%; margin-top: 20px; display: inline-block; }
        #grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; position: relative; z-index: 1; }
        
        .cell { 
            aspect-ratio: 1/1; 
            background: #334155; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 1.3rem; 
            color: #ffffff !important; 
            transition: 0.2s;
        }
        .cell.marked { background: var(--accent); color: #000000 !important; }
        .cell.occupied { background: #111827; color: #4b5563 !important; border: 1px solid #1e293b; }

        /* SVG Line Drawing */
        #mangoSVG { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .winning-line { stroke: #ffffff; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 0.6s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        #mangoWord { font-size: 2.2rem; font-weight: 900; margin-top: 20px; letter-spacing: 8px; color: var(--accent); }
        .crossed { text-decoration: line-through; color: #ef4444; }

        .log-box { background: #0f172a; border-radius: 12px; padding: 10px; margin-top: 20px; max-height: 250px; overflow-y: auto; border: 1px solid #1e293b; }
        .log-entry { border-bottom: 1px solid #1e293b; padding: 10px 0; display: flex; justify-content: space-between; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="homeView">
        <h2 style="margin: 20px 0 40px 0;">🎮 Game Hub</h2>
        <button onclick="switchView('mangoView')">🍉 Mango Game</button>
        <button onclick="switchView('guessView')" style="background:#3b82f6">🔢 Guess Game</button>
    </div>

    <div id="mangoView" class="hidden">
        <div class="card">
            <h3>🍉 Mango Game</h3>
            <button onclick="initMango()">جدول جديد</button>
            <button id="mangoStartBtn" class="btn-alt hidden" onclick="startMangoMode()">بدء الشطب</button>
            <div id="mangoContainer">
                <div id="grid"></div>
                <svg id="mangoSVG" viewBox="0 0 100 100"></svg>
            </div>
            <div id="mangoWord"></div>
            <button onclick="switchView('homeView')" class="btn-alt" style="margin-top:20px">الرئيسية</button>
        </div>
    </div>

    <div id="guessView" class="hidden">
        <div class="card">
            <h3>🔢 Guess Number</h3>
            <div id="guessSetup">
                <input type="number" id="inputSecret" placeholder="ادخل سرك" inputmode="numeric">
                <button onclick="startGuessGame()">ابدأ</button>
            </div>
            <div id="guessPlay" class="hidden">
                <div style="background:#334155; padding:5px 15px; border-radius:20px; margin-bottom:15px; display:inline-block">سرك: <span id="displaySecret" style="color:var(--accent)"></span></div>
                <input type="number" id="currentGuess" placeholder="التخمين" inputmode="numeric">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                    <select id="c1"><option value="0">0 صح</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                    <select id="c2"><option value="0">0 مكان غلط</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                    <select id="c3"><option value="0">0 غلط</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                </div>
                <button onclick="saveGuessLog()">تسجيل</button>
                <div id="guessLogs" class="log-box"></div>
                <button style="background:#ef4444; margin-top:10px" onclick="location.reload()">Reset</button>
            </div>
            <button onclick="switchView('homeView')" class="btn-alt" style="margin-top:10px">الرئيسية</button>
        </div>
    </div>
</div>

<script>
    // Service Worker: هذا الكود "إجباري" ليظهر خيار Install App في كروم
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    function switchView(v) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
    }

    // --- Mango Logic ---
    let mangoData = [], mangoCount = 1, isStarted = false, drawn = new Set();

    function initMango() {
        const g = document.getElementById('grid'), s = document.getElementById('mangoSVG');
        g.innerHTML = ''; s.innerHTML = ''; drawn.clear();
        mangoData = new Array(25).fill(null).map(() => ({ v: null, m: false }));
        mangoCount = 1; isStarted = false;
        document.getElementById('mangoWord').innerHTML = '';
        document.getElementById('mangoStartBtn').classList.remove('hidden');
        for (let i = 0; i < 25; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.onclick = () => {
                if (!isStarted) {
                    if (mangoData[i].v !== null) return;
                    if (mangoCount <= 25) { 
                        mangoData[i].v = mangoCount; 
                        c.innerText = mangoCount++; 
                        c.classList.add('occupied'); 
                    }
                } else if (mangoData[i].v && !mangoData[i].m) {
                    mangoData[i].m = true; c.classList.add('marked'); check();
                }
            };
            g.appendChild(c);
        }
    }

    function startMangoMode() { if (mangoCount > 25) { isStarted = true; document.getElementById('mangoStartBtn').classList.add('hidden'); } }

    function check() {
        const wins = [
            {p:[0,1,2,3,4], t:'h', v:0}, {p:[5,6,7,8,9], t:'h', v:1}, {p:[10,11,12,13,14], t:'h', v:2}, {p:[15,16,17,18,19], t:'h', v:3}, {p:[20,21,22,23,24], t:'h', v:4},
            {p:[0,5,10,15,20], t:'v', v:0}, {p:[1,6,11,16,21], t:'v', v:1}, {p:[2,7,12,17,22], t:'v', v:2}, {p:[3,8,13,18,23], t:'v', v:3}, {p:[4,9,14,19,24], t:'v', v:4},
            {p:[0,6,12,18,24], t:'d1'}, {p:[4,8,12,16,20], t:'d2'}
        ];
        let count = 0;
        wins.forEach((w, i) => {
            if (w.p.every(idx => mangoData[idx].m)) {
                count++;
                if (!drawn.has(i)) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("class", "winning-line");
                    let x1, y1, x2, y2;
                    if(w.t==='h'){ x1=5; x2=95; y1=y2=10+(w.v*20); }
                    else if(w.t==='v'){ y1=5; y2=95; x1=x2=10+(w.v*20); }
                    else if(w.t==='d1'){ x1=y1=5; x2=y2=95; }
                    else { x1=y2=95; x2=y1=5; }
                    line.setAttribute("x1", x1); line.setAttribute("y1", y1); line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                    document.getElementById('mangoSVG').appendChild(line);
                    drawn.add(i);
                }
            }
        });
        let word = "MANGO", res = "";
        for(let i=0; i<5; i++) res += i < count ? `<span class="crossed">${word[i]}</span>` : word[i];
        document.getElementById('mangoWord').innerHTML = res;
    }

    function startGuessGame() {
        const s = document.getElementById('inputSecret').value;
        if(s.length >= 3) {
            document.getElementById('displaySecret').innerText = s;
            document.getElementById('guessSetup').classList.add('hidden');
            document.getElementById('guessPlay').classList.remove('hidden');
        }
    }

    function saveGuessLog() {
        const g = document.getElementById('currentGuess').value;
        if(!g) return;
        const res = `${document.getElementById('c1').value}✓ | ${document.getElementById('c2').value}↻ | ${document.getElementById('c3').value}✗`;
        document.getElementById('guessLogs').insertAdjacentHTML('afterbegin', `<div class="log-entry"><b>${g}</b><span>${res}</span></div>`);
        document.getElementById('currentGuess').value = '';
    }
</script>
</body>
</html>
