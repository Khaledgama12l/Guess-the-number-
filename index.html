<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن الرقم - الاتصال المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 420px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; background: var(--main); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .room-display { background: #eff6ff; border: 2px dashed #bfdbfe; color: #1e40af; padding: 15px; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .secret-view { background: #334155; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .reply-box { background: #fff7ed; padding: 15px; border-radius: 15px; border: 1px solid #ffedd5; margin: 15px 0; }
        .log-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-family: monospace; }
        #statusInfo { font-size: 0.8rem; color: #ef4444; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusInfo">جاري تهيئة النظام...</div>

    <div id="initialView">
        <h3>لعبة خمن الرقم</h3>
        <input type="number" id="inputSecret" placeholder="ادخل سرك (مثلاً: 123)" maxlength="3">
        <button class="btn" style="margin-bottom:10px" onclick="setupRole('host')">فتح غرفة (Host)</button>
        <button class="btn" style="background:#64748b" onclick="setupRole('join')">دخول غرفة (Join)</button>
    </div>

    <div id="hostView" class="hidden">
        <p>أعطِ هذا الرقم لصديقك:</p>
        <div id="myRoomId" class="room-display">...</div>
        <p style="text-align:center; color:#666">بانتظار اتصال الخصم...</p>
    </div>

    <div id="joinView" class="hidden">
        <p>أدخل رقم غرفة الهوست:</p>
        <input type="number" id="targetRoomId" placeholder="مثال: 456123">
        <button class="btn" onclick="startJoining()">بدء الاتصال</button>
    </div>

    <div id="gameView" class="hidden">
        <div class="secret-view">رقمي السري: <span id="displaySecret"></span></div>
        
        <div id="replyArea" class="hidden reply-box">
            <p>الخصم خمن: <strong id="oppGuessVal" style="font-size:1.4rem"></strong></p>
            <div style="display:flex; gap:10px">
                <select id="pIn"><option value="0">0 صح بمكانه</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                <select id="vIn"><option value="0">0 رقم صح</option><option value="1">1</option><option value="2">2</option></select>
            </div>
            <button class="btn" style="background:#ea580c; margin-top:10px" onclick="sendReply()">إرسال الرد</button>
        </div>

        <input type="number" id="myGuess" placeholder="تخمينك للخصم">
        <button class="btn" onclick="sendGuess()">إرسال التخمين</button>

        <div id="logs" style="margin-top:20px; border-top:1px solid #eee"></div>
    </div>
</div>

<script>
    let peer, conn, mySecret;

    // تهيئة PeerJS عند فتح الصفحة لضمان الجاهزية
    function initPeer(id = null) {
        peer = id ? new Peer(id) : new Peer();
        peer.on('open', (assignedId) => {
            document.getElementById('statusInfo').innerText = "متصل بالسيرفر وجاهز";
            document.getElementById('statusInfo').style.color = "#22c55e";
            if(document.getElementById('myRoomId')) document.getElementById('myRoomId').innerText = assignedId;
        });
        peer.on('error', err => {
            document.getElementById('statusInfo').innerText = "خطأ: " + err.type;
            if(err.type === 'unavailable-id') setupRole('host');
        });
        peer.on('connection', c => {
            conn = c;
            bindEvents();
        });
    }

    function setupRole(role) {
        mySecret = document.getElementById('inputSecret').value;
        if(mySecret.length < 3) return alert("اكتب سرك الأول");
        
        document.getElementById('initialView').classList.add('hidden');
        document.getElementById('displaySecret').innerText = mySecret;

        if(role === 'host') {
            document.getElementById('hostView').classList.remove('hidden');
            const numericId = Math.floor(100000 + Math.random() * 900000).toString();
            initPeer(numericId);
        } else {
            document.getElementById('joinView').classList.remove('hidden');
            initPeer();
        }
    }

    function startJoining() {
        const tid = document.getElementById('targetRoomId').value;
        if(!tid) return alert("ادخل رقم الغرفة");
        document.getElementById('statusInfo').innerText = "جاري محاولة الاتصال بـ " + tid + "...";
        conn = peer.connect(tid);
        bindEvents();
    }

    function bindEvents() {
        conn.on('open', () => {
            document.getElementById('statusInfo').innerText = "تم الاتصال بنجاح!";
            document.getElementById('hostView').classList.add('hidden');
            document.getElementById('joinView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
        });

        conn.on('data', data => {
            if(data.t === 'g') {
                document.getElementById('replyArea').classList.remove('hidden');
                document.getElementById('oppGuessVal').innerText = data.v;
            } else if(data.t === 'r') {
                const item = `<div class="log-item"><span>[${data.g}]</span> <span>${data.p} صح / ${data.v} غلط</span></div>`;
                document.getElementById('logs').insertAdjacentHTML('afterbegin', item);
            }
        });
    }

    function sendGuess() {
        const val = document.getElementById('myGuess').value;
        if(!val) return;
        conn.send({t: 'g', v: val});
        document.getElementById('myGuess').value = "";
    }

    function sendReply() {
        const p = document.getElementById('pIn').value, v = document.getElementById('vIn').value;
        const g = document.getElementById('oppGuessVal').innerText;
        conn.send({t: 'r', g: g, p: p, v: v});
        document.getElementById('replyArea').classList.add('hidden');
    }
</script>
</body>
</html>
